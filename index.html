<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Application Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f9fc;
            --surface: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-ring: rgba(37, 99, 235, 0.15);
            --success: #10b981;
            --error: #ef4444;
            --error-ring: rgba(239, 68, 68, 0.15);
            --radius-md: 12px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 700px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .app-header {
            padding: 30px 40px 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .form-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin: 0 0 15px 0;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .step-counter {
            background: var(--input-bg);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        .progress-bar {
            height: 6px;
            background: var(--input-bg);
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .form-content {
            padding: 30px 40px;
        }

        .form-step {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .form-step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-description {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        /* Grid for Desktop */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0; /* Prevents flex-item blowout */
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .req-star {
            color: var(--error);
            margin-left: 3px;
        }

        /* Fix for Date and Text boxes matching exactly */
        input[type="text"], input[type="email"], input[type="number"], 
        input[type="tel"], input[type="date"], input[type="url"], select, textarea {
            display: block;
            width: 100%;
            min-height: 50px;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 16px !important; /* Prevents iOS Zoom */
            transition: var(--transition);
            -webkit-appearance: none; /* Standardizes iOS appearance */
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--surface);
            box-shadow: 0 0 0 4px var(--primary-ring);
        }

        .error-border {
            border-color: var(--error) !important;
            box-shadow: 0 0 0 4px var(--error-ring) !important;
        }

        .currency-input, .phone-input {
            display: flex;
            align-items: stretch;
            width: 100%;
        }

        .currency-prefix {
            background-color: #f1f5f9;
            color: var(--text-secondary);
            padding: 0 16px;
            border: 1px solid var(--border);
            border-right: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .currency-input input, .phone-input input {
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            flex: 1;
        }

        .phone-input select {
            flex: 0 0 100px;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            border-right: none;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            min-height: 50px;
        }

        .toggle-container input { display: none; }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background-color: var(--border);
            border-radius: 24px;
            flex-shrink: 0;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            transition: var(--transition);
        }

        .toggle-container input:checked + .toggle-switch { background-color: var(--success); }
        .toggle-container input:checked + .toggle-switch::after { transform: translateX(20px); }

        .sub-header {
            grid-column: 1 / -1;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .form-footer {
            padding: 20px 40px 30px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        button.nav-btn {
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            border: none;
            min-height: 50px;
        }

        .btn-prev { background: transparent; color: var(--text-secondary); border: 1px solid var(--border) !important; display: none; }
        .btn-next, .btn-submit { background: var(--primary); color: white; flex: 1; }
        .btn-submit { display: none; background: var(--success); }

        .test-fill-btn {
            background: #ef4444; 
            color: white; 
            border: none; 
            padding: 8px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: bold;
        }

        /* MOBILE FIXES */
        @media (max-width: 600px) {
            body { padding: 0; }
            .app-container { border: none; border-radius: 0; box-shadow: none; }
            .app-header { padding: 20px 20px 15px; position: sticky; top: 0; background: #fff; z-index: 100; }
            .form-content { padding: 20px; }
            
            /* Disable Grid on mobile to prevent date box overflow */
            .form-grid { display: block; }
            .input-group { width: 100%; margin-bottom: 20px; }
            
            .form-footer { 
                padding: 15px 20px; 
                position: sticky; 
                bottom: 0; 
                z-index: 100;
                box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            }
        }
    </style>
</head>
<body>

<div class="app-container" id="mainContainer">
    <div class="app-header">
        <h2 class="form-title">Secure Application</h2>
        <div class="header-actions">
            <button type="button" class="test-fill-btn" id="testFillBtn" onclick="autofillTestData()">[TEST] Auto-Fill</button>
            <span class="step-counter" id="stepCounter">Step 1 of 4</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 25%;"></div>
        </div>
    </div>

    <form id="modernForm" onsubmit="submitForm(event)" novalidate>
        <div class="form-content">

            <!-- STEP 1 -->
            <div class="form-step active" id="step1">
                <p class="step-description">Business basic details. All fields required.</p>
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label for="name">Legal Business Name & DBA<span class="req-star">*</span></label>
                        <input type="text" id="name" name="name" placeholder="Company Inc." required>
                    </div>
                    <div class="input-group">
                        <label for="cEmailAddress">Business Email<span class="req-star">*</span></label>
                        <input type="email" id="cEmailAddress" name="cEmailAddress" placeholder="contact@company.com" required>
                    </div>
                    <div class="input-group">
                        <label for="cPhoneNumber">Business Phone<span class="req-star">*</span></label>
                        <div class="phone-input">
                            <select id="cPhoneType" name="cPhoneType" required>
                                <option value="Work">Work</option>
                                <option value="Mobile">Mobile</option>
                            </select>
                            <input type="tel" id="cPhoneNumber" name="cPhoneNumber" placeholder="(555) 000-0000" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="cIncorporatedDate">Incorporation Date<span class="req-star">*</span></label>
                        <input type="date" id="cIncorporatedDate" name="cIncorporatedDate" required>
                    </div>
                    <label class="toggle-container full-width" style="margin-top:10px">
                        <span>Commercial space?</span>
                        <input type="checkbox" id="cCommercialSpace" name="cCommercialSpace">
                        <div class="toggle-switch"></div>
                    </label>
                    <div class="input-group full-width" style="margin-top:15px">
                        <label for="cDescription">Business Description<span class="req-star">*</span></label>
                        <textarea id="cDescription" name="cDescription" rows="3" required></textarea>
                    </div>
                    <div class="input-group full-width">
                        <label for="cDocumentLink">Supporting Documentation Link<span class="req-star">*</span></label>
                        <input type="url" id="cDocumentLink" name="cDocumentLink" placeholder="https://..." required>
                    </div>
                </div>
            </div>

            <!-- STEP 2 -->
            <div class="form-step" id="step2">
                <div class="form-grid">
                    <div class="sub-header">Registered Address</div>
                    <div class="input-group full-width"><label>Street Address*</label><input type="text" id="cAddressStreet" name="cAddressStreet" required></div>
                    <div class="input-group"><label>City*</label><input type="text" id="cAddressCity" name="cAddressCity" required></div>
                    <div class="input-group"><label>State*</label><input type="text" id="cAddressState" name="cAddressState" required></div>
                    <div class="input-group"><label>Postal Code*</label><input type="text" id="cAddressPostalCode" name="cAddressPostalCode" required></div>
                    <div class="input-group"><label>Country*</label><input type="text" id="cAddressCountry" name="cAddressCountry" required></div>
                    
                    <div class="sub-header">Financial Snapshot</div>
                    <div class="input-group full-width"><label>Opportunity Amount*</label><div class="currency-input"><span class="currency-prefix">USD</span><input type="number" id="cOpportunityAmount" name="cOpportunityAmount" required></div></div>
                    <div class="input-group"><label>Annual Revenue*</label><div class="currency-input"><span class="currency-prefix">USD</span><input type="number" id="cAnnualRevenue" name="cAnnualRevenue" required></div></div>
                    <div class="input-group"><label>2025 Projected*</label><div class="currency-input"><span class="currency-prefix">USD</span><input type="number" id="cAnnualRevenue2025" name="cAnnualRevenue2025" required></div></div>
                </div>
            </div>

            <!-- STEP 3 -->
            <div class="form-step" id="step3">
                <div class="form-grid">
                    <div class="input-group"><label>Title*</label><select id="cSalutationName" name="cSalutationName" required><option value="Mr.">Mr.</option><option value="Ms.">Ms.</option></select></div>
                    <div class="input-group"><label>First Name*</label><input type="text" id="cFirstName" name="cFirstName" required></div>
                    <div class="input-group"><label>Middle Name</label><input type="text" id="cMiddleName" name="cMiddleName"></div>
                    <div class="input-group"><label>Last Name*</label><input type="text" id="cLastName" name="cLastName" required></div>
                    <div class="input-group full-width"><label>Personal Email*</label><input type="email" id="cOwnerEmail" name="cOwnerEmail" required></div>
                    <div class="input-group full-width"><label>Mobile Phone*</label><div class="phone-input"><select id="cOwnerPhoneType" name="cOwnerPhoneType"><option value="Mobile">Mobile</option></select><input type="tel" id="cOwnerPhoneNumber" name="cOwnerPhoneNumber" required></div></div>
                    <div class="input-group"><label>FICO Score*</label><input type="number" id="cFICO" name="cFICO" required></div>
                    <div class="input-group"><label>Ownership %*</label><input type="number" id="cOwnershipPercentage" name="cOwnershipPercentage" required></div>
                    <label class="toggle-container full-width"><span style="font-weight:500">I own my home</span><input type="checkbox" id="cDoYouOwnYourHome" name="cDoYouOwnYourHome"><div class="toggle-switch"></div></label>
                </div>
            </div>

            <!-- STEP 4 -->
            <div class="form-step" id="step4">
                <p class="step-description">Add secondary partners or skip and submit.</p>
                <div id="owner2-section" style="display:none; margin-bottom:20px;">
                    <div class="sub-header flex-between">Owner 2<button type="button" class="btn-remove" onclick="removeOwner(2)">Remove</button></div>
                    <div class="form-grid">
                        <div class="input-group"><label>First Name*</label><input type="text" id="cOwner2FirstName" name="cOwner2FirstName"></div>
                        <div class="input-group"><label>Last Name*</label><input type="text" id="cOwner2LastName" name="cOwner2LastName"></div>
                        <div class="input-group full-width"><label>Email*</label><input type="email" id="cOwner2Email" name="cOwner2Email"></div>
                        <div class="input-group full-width"><label>Phone*</label><div class="phone-input"><select id="cOwner2PhoneType" name="cOwner2PhoneType"><option value="Mobile">Mobile</option></select><input type="tel" id="cOwner2PhoneNumber" name="cOwner2PhoneNumber"></div></div>
                        <div class="input-group"><label>FICO*</label><input type="number" id="cOwner2FICO" name="cOwner2FICO"></div>
                        <div class="input-group"><label>Ownership %*</label><input type="number" id="cOwner2OwnershipPercentage" name="cOwner2OwnershipPercentage"></div>
                    </div>
                </div>
                <div id="owner3-section" style="display:none; margin-bottom:20px;">
                    <div class="sub-header flex-between">Owner 3<button type="button" class="btn-remove" onclick="removeOwner(3)">Remove</button></div>
                    <div class="form-grid">
                        <div class="input-group"><label>First Name*</label><input type="text" id="cOwner3FirstName" name="cOwner3FirstName"></div>
                        <div class="input-group"><label>Last Name*</label><input type="text" id="cOwner3LastName" name="cOwner3LastName"></div>
                        <div class="input-group full-width"><label>Email*</label><input type="email" id="cOwner3Email" name="cOwner3Email"></div>
                    </div>
                </div>
                <button type="button" id="btnAddOwner" class="btn-outline" onclick="addOwner()">+ Add Owner</button>
            </div>

        </div>

        <div class="form-footer">
            <button type="button" class="nav-btn btn-prev" id="btnPrev" onclick="changeStep(-1)">Back</button>
            <button type="button" class="nav-btn btn-next" id="btnNext" onclick="changeStep(1)">Continue</button>
            <button type="submit" class="nav-btn btn-submit" id="btnSubmit">Submit Application</button>
        </div>
    </form>
</div>

<script>
    function autofillTestData() {
        document.getElementById('name').value = "Acme Corp";
        document.getElementById('cEmailAddress').value = "test@acmecorp.com";
        document.getElementById('cPhoneNumber').value = "555-123-4567";
        document.getElementById('cIncorporatedDate').value = "2020-01-01";
        document.getElementById('cDescription').value = "Testing webhook payload.";
        document.getElementById('cDocumentLink').value = "https://google.com";
        document.getElementById('cAddressStreet').value = "123 main st";
        document.getElementById('cAddressCity').value = "New York";
        document.getElementById('cAddressState').value = "NY";
        document.getElementById('cAddressPostalCode').value = "10001";
        document.getElementById('cAddressCountry').value = "USA";
        document.getElementById('cOpportunityAmount').value = "10000";
        document.getElementById('cAnnualRevenue').value = "50000";
        document.getElementById('cAnnualRevenue2025').value = "60000";
        document.getElementById('cFirstName').value = "John";
        document.getElementById('cLastName').value = "Doe";
        document.getElementById('cOwnerEmail').value = "john@doe.com";
        document.getElementById('cOwnerPhoneNumber').value = "555-111-2222";
        document.getElementById('cFICO').value = "720";
        document.getElementById('cOwnershipPercentage').value = "100";
        document.getElementById('testFillBtn').innerText = "Data Filled ✓";
    }

    let currentStep = 0;
    const steps = document.querySelectorAll('.form-step');
    const btnNext = document.getElementById('btnNext');
    const btnPrev = document.getElementById('btnPrev');
    const btnSubmit = document.getElementById('btnSubmit');
    const progressFill = document.getElementById('progressFill');
    const stepCounter = document.getElementById('stepCounter');

    function changeStep(dir) {
        if (dir === 1 && !validate()) return;
        currentStep += dir;
        steps.forEach((s, i) => s.classList.toggle('active', i === currentStep));
        progressFill.style.width = ((currentStep + 1) / steps.length * 100) + '%';
        stepCounter.innerText = `Step ${currentStep + 1} of 4`;
        btnPrev.style.display = currentStep === 0 ? 'none' : 'block';
        btnNext.style.display = currentStep === 3 ? 'none' : 'block';
        btnSubmit.style.display = currentStep === 3 ? 'block' : 'none';
        window.scrollTo(0,0);
    }

    function validate() {
        let valid = true;
        steps[currentStep].querySelectorAll('[required]').forEach(i => {
            if (!i.value) { i.classList.add('error-border'); valid = false; }
            else i.classList.remove('error-border');
        });
        return valid;
    }

    function addOwner() {
        const o2 = document.getElementById('owner2-section');
        const o3 = document.getElementById('owner3-section');
        if (o2.style.display === 'none') {
            o2.style.display = 'block';
            o2.querySelectorAll('input').forEach(i => i.required = true);
        } else {
            o3.style.display = 'block';
            o3.querySelectorAll('input').forEach(i => i.required = true);
            document.getElementById('btnAddOwner').style.display = 'none';
        }
    }

    function removeOwner(n) {
        const sec = document.getElementById(`owner${n}-section`);
        sec.style.display = 'none';
        sec.querySelectorAll('input').forEach(i => { i.required = false; i.value = ''; });
        document.getElementById('btnAddOwner').style.display = 'block';
    }

    function submitForm(e) {
        e.preventDefault();
        btnSubmit.disabled = true;
        btnSubmit.innerText = "Sending...";
        const formData = new FormData(e.target);
        const getPhone = (id, typeId) => {
            const val = document.getElementById(id).value;
            return val ? [{phoneNumber: val, type: document.getElementById(typeId).value}] : [];
        };

        const payload = {
            name: formData.get('name'),
            cEmailAddress: formData.get('cEmailAddress'),
            cPhoneNumber: getPhone('cPhoneNumber', 'cPhoneType'),
            cOpportunityAmountCurrency: "USD",
            cOpportunityAmount: parseFloat(formData.get('cOpportunityAmount')),
            cAnnualRevenueCurrency: "USD",
            cAnnualRevenue: parseFloat(formData.get('cAnnualRevenue')),
            cAnnualRevenue2025Currency: "USD",
            cAnnualRevenue2025: parseFloat(formData.get('cAnnualRevenue2025')),
            cIncorporatedDate: formData.get('cIncorporatedDate'),
            cAddressStreet: formData.get('cAddressStreet'),
            cAddressCity: formData.get('cAddressCity'),
            cAddressState: formData.get("cAddressState"),
            cAddressCountry: formData.get("cAddressCountry"),
            cAddressPostalCode: formData.get("cAddressPostalCode"),
            cAddressMap: "",
            cCommercialSpace: document.getElementById('cCommercialSpace').checked,
            cDescription: formData.get('cDescription'),
            cSalutationName: formData.get('cSalutationName'),
            cFirstName: formData.get('cFirstName'),
            cLastName: formData.get('cLastName'),
            cMiddleName: formData.get('cMiddleName'),
            cOwnerPhoneNumber: getPhone('cOwnerPhoneNumber', 'cOwnerPhoneType'),
            cOwnerEmail: formData.get('cOwnerEmail'),
            cFICO: parseInt(formData.get('cFICO')),
            cOwnershipPercentage: parseFloat(formData.get('cOwnershipPercentage')),
            cDoYouOwnYourHome: document.getElementById('cDoYouOwnYourHome').checked,
            cDocumentLink: formData.get('cDocumentLink'),
            cOwner2FirstName: formData.get('cOwner2FirstName') || "",
            cOwner2LastName: formData.get('cOwner2LastName') || "",
            cOwner2PhoneNumber: getPhone('cOwner2PhoneNumber', 'cOwner2PhoneType'),
            cOwner2Email: formData.get('cOwner2Email') || "",
            cOwner2FICO: parseInt(formData.get('cOwner2FICO')) || 0,
            cOwner2OwnershipPercentage: parseFloat(formData.get('cOwner2OwnershipPercentage')) || 0,
            cOwner2OwnHome: false,
            cOwner3FirstName: formData.get('cOwner3FirstName') || "",
            cOwner3LastName: formData.get('cOwner3LastName') || "",
            cOwner3PhoneNumber: getPhone('cOwner3PhoneNumber', 'cOwner3PhoneType'),
            cOwner3Email: formData.get('cOwner3Email') || "",
            cOwner3FICO: 0,
            cOwner3OwnershipPercentage: 0,
            cOwner3OwnHome: false
        };

        fetch("https://api-69a90979af1be5a90.bizioffice.com/webhook/56d4a958-9f72-4228-ae4f-4f2c71dc32a0", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        }).then(r => {
            if(r.ok) {
                document.getElementById('mainContainer').innerHTML = `<div style="padding:60px 20px;text-align:center"><h2>Application Submitted</h2><p>Transmitted successfully.</p></div>`;
            } else { alert("Server error: " + r.status); btnSubmit.disabled = false; }
        }).catch(err => { alert("Network error"); btnSubmit.disabled = false; });
    }
</script>
</body>
</html>
